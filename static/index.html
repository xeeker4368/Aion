<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #242424;
            border-bottom: 1px solid #333;
        }

        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .header-info {
            font-size: 12px;
            color: #888;
        }

        .new-chat-btn {
            padding: 6px 14px;
            background: #333;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }

        .new-chat-btn:hover {
            background: #444;
            color: #fff;
        }

        /* Messages area */
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 8px;
            line-height: 1.5;
            font-size: 15px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .message.user {
            align-self: flex-end;
            background: #2a4a6b;
            color: #e8f0f8;
        }

        .message.assistant {
            align-self: flex-start;
            background: #2d2d2d;
            color: #e0e0e0;
        }

        .message.system-msg {
            align-self: center;
            background: none;
            color: #666;
            font-size: 13px;
            font-style: italic;
        }

        /* Thinking indicator */
        .thinking {
            align-self: flex-start;
            color: #888;
            font-size: 14px;
            padding: 12px 16px;
        }

        .thinking::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* Input area */
        .input-area {
            padding: 16px 20px;
            background: #242424;
            border-top: 1px solid #333;
            display: flex;
            gap: 10px;
        }

        .input-area textarea {
            flex: 1;
            padding: 10px 14px;
            background: #1a1a1a;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 6px;
            font-family: inherit;
            font-size: 15px;
            line-height: 1.4;
            resize: none;
            min-height: 44px;
            max-height: 150px;
            outline: none;
        }

        .input-area textarea:focus {
            border-color: #5a8ab5;
        }

        .input-area textarea::placeholder {
            color: #666;
        }

        .send-btn {
            padding: 10px 20px;
            background: #2a4a6b;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            align-self: flex-end;
        }

        .send-btn:hover {
            background: #35608a;
        }

        .send-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="header">
    <h1>Aion</h1>
    <span class="header-info" id="status"></span>
    <div>
        <a href="/settings" class="new-chat-btn" style="text-decoration:none; margin-right:8px;">Settings</a>
        <button class="new-chat-btn" onclick="newConversation()">New Conversation</button>
    </div>
</div>

<div class="messages" id="messages"></div>

<div class="input-area">
    <textarea
        id="input"
        placeholder="Type a message..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
    ></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');
    const statusEl = document.getElementById('status');

    let sending = false;

    // Load current conversation on page load
    async function loadConversation() {
        try {
            const res = await fetch('/api/conversation/current');
            const data = await res.json();

            messagesEl.innerHTML = '';

            if (data.messages && data.messages.length > 0) {
                for (const msg of data.messages) {
                    addMessage(msg.role, msg.content);
                }
            }

            updateStatus('Connected');
        } catch (err) {
            updateStatus('Connection error');
            console.error(err);
        }
    }

    function addMessage(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role}`;
        div.textContent = content;
        messagesEl.appendChild(div);
        scrollToBottom();
    }

    function addSystemMessage(text) {
        const div = document.createElement('div');
        div.className = 'message system-msg';
        div.textContent = text;
        messagesEl.appendChild(div);
        scrollToBottom();
    }

    function showThinking() {
        const div = document.createElement('div');
        div.className = 'thinking';
        div.id = 'thinking';
        div.textContent = 'Thinking';
        messagesEl.appendChild(div);
        scrollToBottom();
    }

    function hideThinking() {
        const el = document.getElementById('thinking');
        if (el) el.remove();
    }

    function scrollToBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function updateStatus(text) {
        statusEl.textContent = text;
    }

    async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || sending) return;

        sending = true;
        sendBtn.disabled = true;
        inputEl.value = '';
        inputEl.style.height = 'auto';

        addMessage('user', text);
        showThinking();
        updateStatus('Thinking...');

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text }),
            });

            hideThinking();

            if (!res.ok) {
                addSystemMessage('Error: could not get response');
                updateStatus('Error');
                return;
            }

            const data = await res.json();
            addMessage('assistant', data.response);

            const memInfo = data.memories_used > 0
                ? `${data.memories_used} memories retrieved`
                : 'no memories retrieved';
            updateStatus(memInfo);

        } catch (err) {
            hideThinking();
            addSystemMessage('Connection error');
            updateStatus('Error');
            console.error(err);
        } finally {
            sending = false;
            sendBtn.disabled = false;
            inputEl.focus();
        }
    }

    async function newConversation() {
        try {
            await fetch('/api/conversation/new', { method: 'POST' });
            messagesEl.innerHTML = '';
            addSystemMessage('New conversation started');
            updateStatus('New conversation');
            inputEl.focus();
        } catch (err) {
            console.error(err);
        }
    }

    function handleKey(event) {
        if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 150) + 'px';
    }

    // Initialize
    loadConversation();
    inputEl.focus();
</script>

</body>
</html>
